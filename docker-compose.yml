version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ruplanner
      POSTGRES_PASSWORD: ruplanner
      POSTGRES_DB: ruplanner
    ports:
      - "5432:5432"
    volumes:
      - ruplanner_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruplanner"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ruplanner_db: