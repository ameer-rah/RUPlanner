version: "3.9"

services:
  db:
    # Pin to a specific digest in production to prevent supply-chain drift.
    # Run: docker pull postgres:15 && docker inspect postgres:15 --format='{{index .RepoDigests 0}}'
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No ports mapping — DB is only reachable within the Docker network.
    # To use a local GUI client during development, temporarily add:
    #   ports:
    #     - "127.0.0.1:5432:5432"
    volumes:
      - ruplanner_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # In production, set NEXT_PUBLIC_API_BASE_URL to your HTTPS backend URL
        # (e.g. https://api.ruplanner.app) — never use http:// in production
        # as it exposes session tokens and plan data to network interception.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ruplanner_db: