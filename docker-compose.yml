version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ruplanner
      POSTGRES_PASSWORD: ruplanner
      POSTGRES_DB: ruplanner
    ports:
      - "5432:5432"
    volumes:
      - ruplanner_db:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://ruplanner:ruplanner@db:5432/ruplanner
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ruplanner_db: